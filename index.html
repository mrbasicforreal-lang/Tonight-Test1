<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonight Restaurant - Select Your Size</title>
    <style>
        /* Modern Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Black and Gold Premium Theme */
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* Subtle gold glow effect in background */
        body::before {
            content: '';
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 300px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        header {
            text-align: center;
            margin-bottom: 3.5rem;
            z-index: 1;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #d4af37; /* Metallic Gold */
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            margin-bottom: 0.5rem;
        }

        header p {
            color: #a9a9a9;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* Responsive Grid for Box Sizes */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
            z-index: 1;
        }

        /* Interactive Size Cards */
        .card {
            background: linear-gradient(145deg, #141414, #1c1c1c);
            border: 1px solid #2a2515;
            border-radius: 15px;
            padding: 2rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            text-decoration: none; /* Reset link styles */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Hover states matching a premium restaurant look */
        .card:hover {
            transform: translateY(-8px);
            border-color: #d4af37;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.15);
        }

        /* Image Container */
        .image-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #141414;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #222;
            transition: border-color 0.3s ease;
        }

        .card:hover .image-container {
            border-color: rgba(212, 175, 55, 0.4);
        }

        /* Box image styling */
        .box-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .card:hover .box-image {
            transform: scale(1.05);
        }

        .card h2 {
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 0.5rem;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .card:hover h2 {
            color: #d4af37;
        }

        .card p {
            color: #888;
            font-size: 0.9rem;
        }

        /* Gold action dot indicator */
        .card::after {
            content: '➔';
            position: absolute;
            bottom: 1.5rem;
            right: 1.5rem;
            color: #d4af37;
            opacity: 0;
            transform: translateX(-5px);
            transition: all 0.3s ease;
        }

        .card:hover::after {
            opacity: 1;
            transform: translateX(0);
        }
    </style>
</head>
<body>

    <header>
        <h1>Tonight</h1>
        <p>Select your box size to get started</p>
    </header>

    <div class="grid-container">
        
        <!-- SOLO SIZE -->
        <a href="Solo.html" class="card">
            <div class="image-container">
                <img src="Solor.png" alt="Solo Meal Box" class="box-image">
            </div>
            <h2>Solo</h2>
            <p>Perfect for 1 Person!</p>
        </a>

        <!-- TOGETHER SIZE -->
        <a href="Together.html" class="card">
            <div class="image-container">
                <img src="Togetherr.png" alt="Together Meal Box" class="box-image">
            </div>
            <h2>Together</h2>
            <p>Made for 2!</p>
        </a>

        <!-- FRIENDS SIZE -->
        <a href="Friends.html" class="card">
            <div class="image-container">
                <img src="Friens.png" alt="Friends Meal Box" class="box-image">
            </div>
            <h2>Friends</h2>
            <p>Great for 3 People!</p>
        </a>

        <!-- SQUAD SIZE -->
        <a href="Squad.html" class="card">
            <div class="image-container">
                <img src="Squas.png" alt="Squad Meal Box" class="box-image">
            </div>
            <h2>Squad</h2>
            <p>For 4 People!</p>
        </a>

    </div>
     
</body>
</html>
